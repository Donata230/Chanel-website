<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chanel Project</title>
  <link rel="stylesheet" href="index.css"/>
</head>

<body>
  <div class="container">
    
    <div class="card">
      
      <!--Card Image-->
      <div class="card-image">
        <img src="chanel_bottle.jpeg" alt="chanel-bottle" />
      </div>
      
      <!--Card-Content-->
      <div class="card-content">
        <h1>PERFUME</h1>
        <p class="gabrielle">Gabrielle Essence Eua De Parfum</p>
        <p class="floral">A floral, solar and voluptuous interpretation composed by
          Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
          
          <div class="price">
            <span class="new-price">$149.99</span>
            <span class="old-price">$169.99</span>
          </div>
          
          <button class="btn">🛒Add to cart</button>
        
      </div>
      
    </div>
    
  </div>
  
</body>

</html>
